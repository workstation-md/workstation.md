<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title }}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: #0a0a0a;
  color: #e0e0e0;
  line-height: 1.7;
  padding: 3rem 2rem;
  max-width: 820px;
  margin: 0 auto;
  -webkit-font-smoothing: antialiased;
}

nav {
  text-align: right;
  margin-bottom: 2rem;
  font-size: 0.75rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
nav a {
  color: #555;
  text-decoration: none;
  border-bottom: 1px solid #333;
  padding-bottom: 1px;
  transition: color 0.2s;
}
nav a:hover { color: #888; }

h1 {
  font-size: 2.2rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 0.5rem;
  letter-spacing: -0.02em;
}

h1 + p, h1 + p + p {
  color: #777;
  font-size: 0.95rem;
}

h2 {
  font-size: 1rem;
  font-weight: 500;
  color: #fff;
  margin-top: 3rem;
  margin-bottom: 1rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid #1a1a1a;
}

h3 {
  font-size: 0.9rem;
  font-weight: 500;
  color: #ccc;
  margin-top: 1.5rem;
  margin-bottom: 0.5rem;
}

p { margin: 0.75rem 0; font-size: 0.88rem; }

pre {
  background: #111;
  border: 1px solid #1e1e1e;
  border-radius: 4px;
  padding: 1rem 1.2rem;
  overflow-x: auto;
  font-size: 0.82rem;
  margin: 0.75rem 0;
  line-height: 1.6;
}

code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
}

:not(pre) > code {
  background: #161616;
  border: 1px solid #222;
  padding: 0.15em 0.4em;
  border-radius: 3px;
  color: #aaa;
}

pre code { background: none; border: none; padding: 0; color: #ccc; }

table {
  border-collapse: collapse;
  width: 100%;
  margin: 0.75rem 0;
  font-size: 0.82rem;
}
th, td {
  border: 1px solid #1e1e1e;
  padding: 0.5rem 0.75rem;
  text-align: left;
}
th { background: #111; color: #888; font-weight: 500; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
td { color: #aaa; }

a { color: #888; transition: color 0.2s; }
a:hover { color: #fff; }

ul, ol { padding-left: 1.5rem; font-size: 0.88rem; }
li { margin: 0.4rem 0; color: #aaa; }
li strong { color: #ccc; }

::selection { background: #333; color: #fff; }
</style>
</head>
<body>
<nav><a href="human.html">i'm a human</a></nav>
{{ content }}
</body>
</html>
